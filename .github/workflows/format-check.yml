name: Format Check

on:
  pull_request:
    branches: [master]
    paths:
      - '**.hpp'
      - '**.cpp'
      - '**.h'

jobs:
  clang-format:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          find include/ src/ examples/ \
            -name '*.hpp' -o -name '*.cpp' -o -name '*.h' \
            | xargs clang-format-18 --dry-run -Werror
